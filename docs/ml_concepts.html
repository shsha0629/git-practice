<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ML 개념 그래프 모음</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
  <style>
    :root {
      --bg: #ffffff;
      --bg2: #f5f5f5;
      --text: #1a1a1a;
      --text2: #666;
      --border: rgba(0, 0, 0, 0.1);
      --grid: rgba(0, 0, 0, 0.06);
      --purple: #534AB7;
      --teal: #1D9E75;
      --coral: #D85A30;
      --purple-bg: #EEEDFE;
      --purple-text: #3C3489;
      --green-bg: #dcfce7;
      --green-text: #15803d;
      --red-bg: #fee2e2;
      --red-text: #b91c1c;
      --blue-bg: #dbeafe;
      --blue-text: #1d4ed8;
    }

    @media (prefers-color-scheme: dark) {
      :root {
        --bg: #1a1a1a;
        --bg2: #2a2a2a;
        --text: #e0e0e0;
        --text2: #aaa;
        --border: rgba(255, 255, 255, 0.1);
        --grid: rgba(255, 255, 255, 0.07);
        --purple-bg: #2d2860;
        --purple-text: #afa9ec;
        --green-bg: #14402a;
        --green-text: #5dcaa5;
        --red-bg: #3f1a1a;
        --red-text: #f09595;
        --blue-bg: #1a2e4a;
        --blue-text: #85b7eb;
      }
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: var(--bg);
      color: var(--text);
      padding: 20px;
      max-width: 700px;
      margin: 0 auto;
    }

    .graph-section {
      display: none;
    }

    .graph-section.active {
      display: block;
    }

    h2 {
      font-size: 17px;
      font-weight: 500;
      margin-bottom: 4px;
    }

    .subtitle {
      font-size: 13px;
      color: var(--text2);
      margin-bottom: 16px;
    }

    .canvas-wrap {
      position: relative;
      width: 100%;
      height: 280px;
    }

    .tab-row, .step-row {
      display: flex;
      gap: 8px;
      margin-bottom: 16px;
      flex-wrap: wrap;
    }

    .tab-btn {
      padding: 6px 14px;
      font-size: 13px;
      border-radius: 99px;
      border: 1px solid var(--border);
      background: var(--bg);
      color: var(--text2);
      cursor: pointer;
      transition: all .15s;
    }

    .tab-btn.active {
      background: var(--purple);
      border-color: var(--purple);
      color: #fff;
    }

    .stat-row {
      display: flex;
      gap: 10px;
      margin-top: 12px;
      flex-wrap: wrap;
    }

    .stat-card {
      background: var(--bg2);
      border-radius: 8px;
      padding: 10px 14px;
      flex: 1;
      min-width: 120px;
    }

    .stat-label {
      font-size: 11px;
      color: var(--text2);
      margin-bottom: 3px;
    }

    .stat-val {
      font-size: 17px;
      font-weight: 500;
    }

    .explain-box {
      margin-top: 12px;
      padding: 12px 16px;
      border-left: 2px solid var(--purple);
      background: var(--bg2);
      font-size: 13px;
      color: var(--text2);
      line-height: 1.7;
    }

    .formula {
      font-family: monospace;
      font-size: 13px;
      background: var(--bg2);
      border-radius: 6px;
      padding: 10px 14px;
      margin-top: 10px;
      line-height: 1.9;
    }

    .sl-row {
      display: flex;
      align-items: center;
      gap: 10px
